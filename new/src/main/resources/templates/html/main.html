    <style>
        .navbar-nav > li > a {
            padding-top: 4px;
            padding-bottom: 0;
            height: 28px;
            margin-top: 15px;
        }

        .navbar {
            min-height: 20px;
            display: flow-root;
        }

        .dynamic-content {
            flex: 1;
            background: #a777e3;
            width: 147px;
            overflow: auto; /* 内容溢出处理 */
        }

        .flex-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .flip-container {
            perspective: 1000px;
            width: 300px;
            height: 200px;
        }

        .flip-box {
            flex: 1;
            position: relative;
            bottom:100px;
            margin-top: 160px;
            width: 147px;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s, scale 0.3s;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .flip-box:hover {
            transform: scale(1.05);
        }

        .flip-box.flipped {
            transform: rotateY(180deg);
        }

        .flip-box-front,
        .flip-box-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }



        .carousel-index {
            width: var(--tankuan);
            /*width: 300px;*/
            position: fixed;
            z-index: 9998;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            border: 3px solid white;
            border-radius: 15px;
            animation: smooth-drift 40s infinite ease-in-out;
            transform: translateZ(0);
            will-change: transform;
        }

        @keyframes smooth-drift {
            0%, 100% {
                transform: translate(5vw, 20vh);
            }
            25% {
                transform: translate(40vw, 1vh);
            }
            50% {
                transform: translate(65vw, 30vh);
            }
            75% {
                transform: translate(30vw, 50vh);
            }
        }

        .index-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            backface-visibility: hidden;
        }

        .marquee-container {
            flex: 1;
            max-width: 30%; /* 移除最大宽度限制 */
            overflow: hidden;
            margin: 0 10px;
            position: relative;
            height: 36px; /* 增加高度 */
            background: linear-gradient(
                    135deg,
                    rgba(46, 139, 87, 0.3) 0%,
                    rgba(60, 179, 113, 0.3) 30%,
                    rgba(79, 206, 123, 0.3) 70%,
                    rgba(102, 217, 143, 0.3) 100%
            );
            border-radius: 18px; /* 增加圆角 */
            padding: 0 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(46, 139, 87, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .marquee-content {
            color: white;
            white-space: nowrap;
            position: absolute;
            animation: marquee 25s linear infinite; /* 减慢速度 */
            font-size: 14px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            padding-right: 50px; /* 增加右侧内边距 */
            min-width: max-content; /* 确保内容完整显示 */
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .scrolling-container {
            width: 200px; /* 增加宽度 */
            height: 36px; /* 增加高度 */
            overflow: hidden;
            white-space: nowrap;
            background: linear-gradient(
                    135deg,
                    rgba(46, 139, 87, 0.25) 0%,
                    rgba(60, 179, 113, 0.25) 100%
            );
            border-radius: 18px; /* 增加圆角 */
            position: relative;
            /*float: center;*/
            box-shadow: 0 2px 6px rgba(46, 139, 87, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .scrolling-text {
            position: absolute;
            right: 0;
            color: white;
            font-weight: 500;
            padding: 8px 15px; /* 增加内边距 */
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            animation: scroll-text 10s linear infinite; /* 添加动画 */
        }

        @keyframes scroll-text {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }


        #Iframe1 {
            height:100%;
        }

        .clean-btn-div {
            background-color: transparent;
            color: white;
            width: 20px;
            height: 20px;
            border: 1px solid white;
            font-size: 13px;
            border-radius: 50%;
            position: absolute;
            z-index: 9999;
            top: 0;
            right: 0;
            text-align: center;
            margin: 10px;
            transform: none;
        }

        .index-btn-div {
            background-color: transparent;
            color: white;
            width: 20px;
            height: 20px;
            border: 1px solid white;
            font-size: 13px;
            border-radius: 50%;
            position: absolute;
            z-index: 9999;
            top: 0;
            right: 0;
            text-align: center;
            margin: 10px;
            transform: none;
        }

        .index-btn-div:hover {
            cursor: pointer;
        }

        .clean-btn-div:hover {
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .content-main{
            width: 100%;
            display: flex;
        }
        .content-left{
            width: 15%;
            background-color: #000000;
        }
        .content-right{
            width: 85%;

        }

        .carousel-container {
            width: 100%;
            height: var(--dinggao, 400px);
            position: relative;
            overflow: hidden;
            margin-bottom:5px;

        }

        /* 轮播图片容器 */
        .carousel-images {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 轮播项样式 */
        .carousel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 2;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


    </style>
</head>

<script type="text/javascript">
    $(function () {
        $('a').click(function () {
            let src = $(this).data('src');
            if (src != '' && src != undefined) {
                $('#iframe').attr('src', src);
                if ($('#navbarSupportedContent').hasClass('show')) {
                    $('.navbar-toggler').click();
                }
            }
        })
    })

    const flipBox = document.getElementById('flipBox');
    let isFlipped = false;

    function autoFlip() {
        isFlipped = !isFlipped;
        flipBox.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
    }

    // 初始加载后立即执行一次翻转
    setTimeout(autoFlip, 0);

    // 设置每3秒自动翻转一次
    setInterval(autoFlip, 5000);
</script>
